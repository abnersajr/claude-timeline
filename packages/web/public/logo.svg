<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 56" fill="none">
  <!-- Claude C mark — open arc representing the session loop -->
  <path d="M 24.3 13.3 A 18 18 0 1 0 24.3 42.7"
        stroke="#D97706" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Timeline connector line -->
  <line x1="40" y1="28" x2="152" y2="28"
        stroke="#4B5563" stroke-width="2" stroke-linecap="round"/>

  <!-- Session turn dots — varying sizes suggest conversation flow -->
  <circle cx="54" cy="28" r="4.5" fill="#D97706"/>
  <circle cx="78" cy="28" r="3.5" fill="#F59E0B"/>
  <circle cx="104" cy="28" r="5" fill="#D97706"/>
  <circle cx="132" cy="28" r="3" fill="#F59E0B" opacity="0.6"/>

  <!-- Project name -->
  <text x="166" y="34"
        font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, 'Liberation Mono', Menlo, monospace"
        font-size="22" font-weight="600" fill="#D1D5DB" letter-spacing="-0.5">claude<tspan fill="#D97706">-</tspan>timeline</text>
</svg>
